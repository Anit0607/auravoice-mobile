name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        env:
          JAVA_OPTS: "-Xmx4g"

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find android -name "*.apk" -type f | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK at: $APK_PATH"
          ls -lh $APK_PATH

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: auravoice-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "AuraVoice Build #${{ github.run_number }}"
          body: |
            ## AuraVoice AI - Android APK

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}

            ### Install Instructions
            1. Download the APK file below
            2. Transfer to your Android phone
            3. Enable "Install from unknown sources" in Settings > Security
            4. Open the APK file and install

            > This is a debug build for testing purposes.
          files: ${{ steps.find_apk.outputs.apk_path }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
