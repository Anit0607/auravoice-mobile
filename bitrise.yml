---
format_version: '11'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: react-native
trigger_map:
- push_branch: main
  workflow: primary
workflows:
  primary:
    steps:
    - git-clone@6: {}
    - cache-pull@2: {}
    - install-missing-android-tools@2:
        inputs:
        - gradlew_path: ./android/gradlew
    - npm@1:
        inputs:
        - command: ci
    - script@1:
        title: Build Android APK
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            cd android
            ./gradlew clean assembleRelease
            cd ..
    - script@1:
        title: Copy APK to Deploy Directory
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            mkdir -p $BITRISE_DEPLOY_DIR
            cp android/app/build/outputs/apk/release/app-release.apk $BITRISE_DEPLOY_DIR/auravoice-ai.apk
            ls -lh $BITRISE_DEPLOY_DIR/
    - deploy-to-bitrise-io@2:
        inputs:
        - notify_user_groups: on-failure
    - cache-push@2: {}
app:
  envs:
  - opts:
      is_expand: false
    GRADLE_BUILD_FILE_PATH: android/build.gradle
  - opts:
      is_expand: false
    GRADLE_WRAPPER_LOCATION: android/gradlew
